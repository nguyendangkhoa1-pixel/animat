<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Toei Animation Store</title>

<!-- CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css">

<style>
body { font-family: Arial; }
#logo img { height: 50px; }
.product-thumb { border:1px solid #ddd; padding:10px; margin-bottom:15px; }
.product-name { font-weight:bold; margin-bottom:5px; }
.price { color:red; font-weight:bold; }
</style>
</head>

<body>

<!-- HEADER -->
<header class="container">
    <div class="row">
        <div class="col-md-6">
            <img src="https://www.toei-anim.com/catalog/view/theme/default/image/logo/toei.png" alt="logo">
        </div>
        <div class="col-md-6 text-right">
            <input type="text" placeholder="Search..." class="form-control">
        </div>
    </div>
</header>

<!-- SLIDER -->
<div class="container">
    <div class="swiper">
        <div class="swiper-wrapper">

            <div class="swiper-slide">
                <img src="https://www.toei-anim.com/image/cache/catalog/Banner/241227/470812093_925835119647277_2551153367018639881_n-1600x582.jpg" class="img-responsive">
            </div>

            <div class="swiper-slide">
                <img src="https://www.toei-anim.com/image/cache/catalog/Banner/240409/1920x698_OP_marco%20copy-1600x582.jpg" class="img-responsive">
            </div>

        </div>

        <div class="swiper-pagination"></div>
    </div>
</div>

<!-- PRODUCTS -->
<div class="container">
    <h2>Latest Products</h2>

    <div class="row">

        <div class="col-md-4">
            <div class="product-thumb">
                <div class="product-name">One Piece Picnic Mat</div>
                <img src="https://www.toei-anim.com/image/cache/catalog/sweet/OP_sweets_picnicmat-500x500.jpg" class="img-responsive">
                <div class="price">$198</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="product-thumb">
                <div class="product-name">Butt Detective Picnic Mat</div>
                <img src="https://www.toei-anim.com/image/cache/catalog/Butt%20Detective/BD_picnic-500x500.jpg" class="img-responsive">
                <div class="price">$138</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="product-thumb">
                <div class="product-name">Height Sticker</div>
                <img src="https://www.toei-anim.com/image/cache/catalog/Butt%20Detective/BD_wallsticker_01-500x500.jpg" class="img-responsive">
                <div class="price">$108</div>
            </div>
        </div>

    </div>
</div>

<!-- FOOTER -->
<footer class="container text-center" style="margin-top:50px;">
    <hr>
    <p>© Toei Animation</p>
</footer>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

<script>
const swiper = new Swiper('.swiper', {
    loop: true,
    autoplay: {
        delay: 3000,
    },
    pagination: {
        el: '.swiper-pagination',
        clickable: true
    }
});
</script>

</body>
</html>
